<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        h1,
        h2 {
            text-align: center;
            margin-bottom: 10px;
        }

        .status {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .status.connected {
            background: #2e7d32;
        }

        .status.disconnected {
            background: #c62828;
        }

        .status.connecting {
            background: #f57c00;
        }

        .section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* Direction buttons */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 250px;
            margin: 0 auto;
        }

        .dpad button {
            aspect-ratio: 1;
            font-size: 24px;
            border: none;
            border-radius: 12px;
            background: #0f3460;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
        }

        .dpad button:hover {
            background: #1a5276;
        }

        .dpad button:active {
            background: #e94560;
            transform: scale(0.95);
        }

        .dpad button.stop {
            background: #c62828;
        }

        .dpad button.stop:hover {
            background: #e53935;
        }

        .dpad .empty {
            background: transparent;
        }

        /* Sliders */
        .slider-group {
            margin-bottom: 15px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #0f3460;
            outline: none;
            appearance: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
        }

        .slider-value {
            font-weight: bold;
            color: #e94560;
            min-width: 45px;
            text-align: right;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-row button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-send {
            background: #2e7d32;
            color: white;
        }

        .btn-send:hover {
            background: #388e3c;
        }

        .btn-reset {
            background: #455a64;
            color: white;
        }

        .btn-reset:hover {
            background: #546e7a;
        }

        /* Log */
        .log {
            background: #0a0a12;
            border-radius: 8px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }

        .log-entry {
            margin: 4px 0;
        }

        .log-entry.sent {
            color: #81c784;
        }

        .log-entry.received {
            color: #64b5f6;
        }

        .log-entry.error {
            color: #e57373;
        }

        .log-entry.info {
            color: #aaa;
        }

        /* Connection input */
        .connect-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .connect-row input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
        }

        .connect-row button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .connect-row button:hover {
            background: #ff6b6b;
        }
    </style>
</head>

<body>
    <h1>🤖 Robot Control</h1>

    <div class="section">
        <div class="connect-row">
            <input type="text" id="wsUrl" placeholder="ws://192.168.1.100/ws" value="">
            <button onclick="toggleConnection()">Connect</button>
        </div>
        <div id="status" class="status disconnected">Disconnected</div>
    </div>

    <div class="section">
        <h2>Direction</h2>
        <div class="dpad">
            <div class="empty"></div>
            <button onclick="sendCmd('forward')">⬆️</button>
            <div class="empty"></div>
            <button onclick="sendCmd('left')">⬅️</button>
            <button class="stop" onclick="sendCmd('stop')">⏹️</button>
            <button onclick="sendCmd('right')">➡️</button>
            <div class="empty"></div>
            <button onclick="sendCmd('backward')">⬇️</button>
            <div class="empty"></div>
        </div>
    </div>

    <div class="section">
        <h2>Individual Motors</h2>

        <div class="slider-group">
            <label>Front Left <span class="slider-value" id="fl-val">0</span></label>
            <input type="range" id="fl" min="-100" max="100" value="0" oninput="updateSlider('fl')">
        </div>

        <div class="slider-group">
            <label>Front Right <span class="slider-value" id="fr-val">0</span></label>
            <input type="range" id="fr" min="-100" max="100" value="0" oninput="updateSlider('fr')">
        </div>

        <div class="slider-group">
            <label>Rear Left <span class="slider-value" id="rl-val">0</span></label>
            <input type="range" id="rl" min="-100" max="100" value="0" oninput="updateSlider('rl')">
        </div>

        <div class="slider-group">
            <label>Rear Right <span class="slider-value" id="rr-val">0</span></label>
            <input type="range" id="rr" min="-100" max="100" value="0" oninput="updateSlider('rr')">
        </div>

        <div class="btn-row">
            <button class="btn-send" onclick="sendMotorSpeeds()">Send Speeds</button>
            <button class="btn-reset" onclick="resetSliders()">Reset All</button>
        </div>
    </div>

    <div class="section">
        <h2>Encoders</h2>
        <div class="btn-row">
            <button class="btn-send" onclick="sendCmd('encoders')">Read Encoders</button>
            <button class="btn-reset" onclick="sendCmd('reset_encoders')">Reset Encoders</button>
        </div>
    </div>

    <div class="section">
        <h2>Log</h2>
        <div id="log" class="log"></div>
    </div>

    <script>
        let ws = null;

        function setStatus(state, text) {
            const el = document.getElementById('status');
            el.className = 'status ' + state;
            el.textContent = text;
        }

        function log(msg, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function toggleConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            } else {
                connect();
            }
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            if (!url) {
                log('Please enter WebSocket URL', 'error');
                return;
            }

            setStatus('connecting', 'Connecting...');
            log('Connecting to ' + url);

            ws = new WebSocket(url);

            ws.onopen = () => {
                setStatus('connected', 'Connected');
                log('Connected!', 'info');
            };

            ws.onclose = () => {
                setStatus('disconnected', 'Disconnected');
                log('Disconnected', 'info');
            };

            ws.onerror = (e) => {
                setStatus('disconnected', 'Error');
                log('Connection error', 'error');
            };

            ws.onmessage = (e) => {
                log('← ' + e.data, 'received');
            };
        }

        function sendCmd(cmd) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Not connected!', 'error');
                return;
            }
            ws.send(cmd);
            log('→ ' + cmd, 'sent');
        }

        function updateSlider(id) {
            const val = document.getElementById(id).value;
            document.getElementById(id + '-val').textContent = val;
        }

        function sendMotorSpeeds() {
            const fl = document.getElementById('fl').value;
            const fr = document.getElementById('fr').value;
            const rl = document.getElementById('rl').value;
            const rr = document.getElementById('rr').value;
            sendCmd(`${fl},${fr},${rl},${rr}`);
        }

        function resetSliders() {
            ['fl', 'fr', 'rl', 'rr'].forEach(id => {
                document.getElementById(id).value = 0;
                document.getElementById(id + '-val').textContent = '0';
            });
            sendCmd('stop');
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            switch (e.key) {
                case 'ArrowUp':
                case 'w': sendCmd('forward'); break;
                case 'ArrowDown':
                case 's': sendCmd('backward'); break;
                case 'ArrowLeft':
                case 'a': sendCmd('left'); break;
                case 'ArrowRight':
                case 'd': sendCmd('right'); break;
                case ' ': sendCmd('stop'); e.preventDefault(); break;
            }
        });

        // Try to auto-fill URL based on current host
        if (location.hostname && location.hostname !== 'localhost') {
            document.getElementById('wsUrl').value = `ws://${location.hostname}/ws`;
        }
    </script>
</body>

</html>
